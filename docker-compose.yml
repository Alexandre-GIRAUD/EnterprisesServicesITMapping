services:
  neo4j:
    image: neo4j:5-community
    container_name: itmapping-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes: 
      - neo4j_data:/data
    # Cold start (first pull, APOC, DB init) can exceed a short health window; start_period avoids false "unhealthy".
    healthcheck:
      test:
        [
          "CMD",
          "cypher-shell",
          "-a",
          "bolt://127.0.0.1:7687",
          "-u",
          "neo4j",
          "-p",
          "password",
          "RETURN 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 90s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: itmapping-backend
    # Host 8080 is often already in use (local Spring Boot, etc.). Use 8081 on host by default.
    # Override: BACKEND_HOST_PORT=8090 docker compose up -d
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: itmapping-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
