spring:
  application:
    name: enterprise-it-mapping-backend

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:password}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# Actuator (health, metrics)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Demo: insert sample applications + dependencies when DB has no Application nodes
app:
  # GitHub: server-side PAT only (OAuth flow can replace this later).
  # Export GITHUB_TOKEN in the environment; never send tokens to the frontend.
  integrations:
    github:
      token: ${GITHUB_TOKEN:}
      api-base-url: https://api.github.com
      max-repos: 100
    # OpenAI-compatible chat (server key only; never expose to browser).
    llm:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
      chat-completions-path: /v1/chat/completions
      model: gpt-4o-mini
      timeout-ms: 120000
      max-completion-tokens: 4096
      max-user-prompt-chars: 120000
      max-paths-in-prompt: 800
  sample-data:
    seed: ${SAMPLE_DATA_SEED:true} # set SAMPLE_DATA_SEED=false to disable
    # Neo4j may not accept Bolt immediately (Docker order, cold start, APOC). Retry before giving up.
    max-attempts: ${SAMPLE_DATA_MAX_ATTEMPTS:30}
    retry-delay-ms: ${SAMPLE_DATA_RETRY_DELAY_MS:2000}
  # Max CONTAINS hops for GET /applications/{id}/module-graph (capped in code at 50).
  module-graph:
    max-depth: ${APP_MODULE_GRAPH_MAX_DEPTH:10}

# JWT-ready placeholders (no implementation yet)
